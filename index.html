<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VARA5 LuxeVoyage — Private Travel Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --gold-dim: #c9a96e70;
  --gold-faint: #c9a96e25;
  --gold-glow: #c9a96e12;
  --bg-deep: #111118;
  --bg-mid: #16161f;
  --bg-surface: #1b1b26;
  --bg-card: #1e1e2a;
  --bg-card-alt: #22222f;
  --border-subtle: #ffffff0f;
  --border-medium: #ffffff18;
  --text-primary: #f0ece4;
  --text-body: #d5d0c8;
  --text-secondary: #aba69e;
  --text-muted: #6e695f;
  --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg-deep);
  font-family: var(--serif);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-faint); border-radius: 2px; }

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  position: relative;
}

#app::before {
  content: '';
  position: fixed;
  top: -40%; left: -40%;
  width: 180%; height: 180%;
  background: radial-gradient(ellipse at 25% 15%, #c9a96e06 0%, transparent 55%),
              radial-gradient(ellipse at 75% 85%, #c9a96e04 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
.header {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(30px);
  background: rgba(17,17,24,0.92);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.header-brand { display: flex; flex-direction: column; }
.header-name {
  font-size: 11px; letter-spacing: 5px; color: var(--gold);
  font-family: var(--sans); font-weight: 500; text-transform: uppercase;
}
.header-title {
  font-size: 26px; font-weight: 300; letter-spacing: 1.5px;
  color: var(--text-primary); margin-top: 2px;
}
.header-meta { text-align: right; font-family: var(--sans); }
.header-meta-line {
  font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; line-height: 1.7;
}
.header-meta-accent { color: var(--gold-dim); }
.header-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80; margin-right: 6px; animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:0.4} 50%{opacity:1} }

.new-chat-btn {
  position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
  display: none; background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 8px; padding: 7px 16px; color: var(--text-secondary);
  font-size: 11px; font-family: var(--sans); letter-spacing: 1.5px;
  cursor: pointer; transition: all 0.25s;
}
.new-chat-btn:hover { border-color: var(--gold-faint); color: var(--gold); }
.has-messages .new-chat-btn { display: block; }
.has-messages .header-meta { display: none; }

/* ─── CHAT ─── */
.chat-area {
  flex: 1; overflow-y: auto; padding: 28px 20px 20px;
  position: relative; z-index: 1;
}
.chat-inner { max-width: 820px; margin: 0 auto; }

/* ─── WELCOME ─── */
.welcome {
  text-align: center; padding: 70px 24px 40px; animation: fadeUp 0.8s ease-out;
}
.welcome-label {
  font-size: 10px; letter-spacing: 6px; color: var(--gold-dim);
  font-family: var(--sans); margin-bottom: 20px; text-transform: uppercase;
}
.welcome-headline {
  font-size: 36px; font-weight: 300; line-height: 1.3;
  color: var(--text-primary); max-width: 500px; margin: 0 auto 20px;
}
.welcome-sub {
  font-size: 15px; color: var(--text-muted); font-family: var(--sans);
  line-height: 1.7; max-width: 440px; margin: 0 auto 40px; font-weight: 300;
}
.welcome-suggestions {
  display: flex; flex-direction: column; gap: 10px;
  max-width: 480px; margin: 0 auto;
}
.suggestion-btn {
  background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 12px; padding: 14px 20px; color: var(--text-secondary);
  font-size: 16px; font-family: var(--serif); cursor: pointer;
  transition: all 0.3s; text-align: left; line-height: 1.4;
}
.suggestion-btn:hover {
  border-color: var(--gold-faint); color: var(--text-primary); background: var(--bg-card-alt);
}
.suggestion-icon {
  display: inline-block; margin-right: 10px; color: var(--gold-dim); font-size: 14px;
}

/* ─── MESSAGES ─── */
.message { margin-bottom: 22px; animation: fadeUp 0.4s ease-out; }
.message-user { display: flex; justify-content: flex-end; }
.message-assistant { display: flex; justify-content: flex-start; }

.message-label {
  font-size: 10px; letter-spacing: 2.5px; color: var(--gold-dim);
  font-family: var(--sans); margin-bottom: 6px; text-transform: uppercase; font-weight: 500;
}

.bubble-user {
  background: linear-gradient(135deg, var(--gold-glow), #c9a96e0a);
  border: 1px solid var(--gold-faint); border-radius: 18px 18px 4px 18px;
  padding: 14px 20px; max-width: 72%; font-size: 17px;
  line-height: 1.6; color: var(--text-primary);
}

.bubble-assistant {
  background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 18px 18px 18px 4px; max-width: 100%; color: var(--text-body);
}
.bubble-short {
  padding: 14px 20px; font-size: 17px; line-height: 1.65; font-family: var(--serif);
}
.bubble-long {
  padding: 28px 32px; font-size: 15.5px; line-height: 1.8;
  font-family: var(--sans); font-weight: 300; letter-spacing: 0.15px;
}

/* Markdown */
.bubble-assistant h1 {
  font-size: 22px; font-weight: 500; margin: 24px 0 10px;
  color: var(--gold); font-family: var(--serif);
}
.bubble-assistant h1:first-child { margin-top: 0; }
.bubble-assistant h2 {
  font-size: 19px; font-weight: 500; margin: 22px 0 8px;
  color: var(--gold); font-family: var(--serif);
}
.bubble-assistant h3 {
  font-size: 17px; font-weight: 500; margin: 18px 0 6px;
  color: #d4b87a; font-family: var(--serif);
}
.bubble-assistant h4 {
  font-size: 16px; font-weight: 500; margin: 14px 0 5px;
  color: #d4b87a; font-family: var(--serif);
}
.bubble-assistant p { margin: 10px 0; color: var(--text-body); }
.bubble-assistant ul, .bubble-assistant ol { margin: 10px 0 10px 22px; }
.bubble-assistant li { margin: 5px 0; line-height: 1.75; color: var(--text-body); }
.bubble-assistant strong { color: var(--text-primary); font-weight: 500; }
.bubble-assistant em { font-style: italic; color: var(--text-secondary); }
.bubble-assistant hr { border: none; border-top: 1px solid var(--border-subtle); margin: 20px 0; }
.bubble-long h2 { padding-top: 8px; border-top: 1px solid var(--border-subtle); }
.bubble-long h2:first-of-type { border-top: none; padding-top: 0; }

/* Actions */
.message-actions { display: flex; gap: 8px; margin-top: 12px; }
.action-btn {
  background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 7px; padding: 6px 16px; color: var(--text-muted);
  font-size: 11px; font-family: var(--sans); cursor: pointer;
  letter-spacing: 1.5px; transition: all 0.25s; text-transform: uppercase; font-weight: 500;
}
.action-btn:hover { border-color: var(--gold-faint); color: var(--gold); }
.action-btn.copied { color: #4ade80; border-color: #4ade8030; }

/* Loading */
.loading-wrapper { margin-bottom: 22px; animation: fadeUp 0.4s ease-out; }
.loading-bubble {
  background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 18px 18px 18px 4px; padding: 18px 22px; display: inline-block;
}
.loading-dots { display: flex; gap: 7px; margin-bottom: 10px; }
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
  animation: dotPulse 1.4s infinite ease-in-out;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100%{opacity:0.2;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }
.loading-text {
  font-size: 13px; color: var(--gold-dim); font-family: var(--sans);
  font-style: italic; font-weight: 300; transition: opacity 0.4s;
}

/* Input */
.input-area {
  padding: 16px 20px 18px; border-top: 1px solid var(--border-subtle);
  background: rgba(17,17,24,0.94); backdrop-filter: blur(30px);
  position: relative; z-index: 10; flex-shrink: 0;
}
.input-inner {
  max-width: 820px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end;
}
.input-field {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border-medium);
  border-radius: 14px; padding: 14px 20px; color: var(--text-primary);
  font-size: 17px; font-family: var(--serif); resize: none;
  min-height: 50px; max-height: 150px; line-height: 1.5; transition: border-color 0.3s;
}
.input-field:focus { outline: none; border-color: var(--gold-faint); }
.input-field::placeholder { color: var(--text-muted); font-style: italic; }
.send-btn {
  background: var(--gold); border: none; border-radius: 12px;
  padding: 14px 24px; color: var(--bg-deep); font-size: 11px;
  font-family: var(--sans); font-weight: 600; letter-spacing: 2.5px;
  cursor: pointer; transition: all 0.25s; text-transform: uppercase; flex-shrink: 0;
}
.send-btn:hover { background: #d4b87a; }
.send-btn:disabled { background: var(--gold-faint); color: var(--gold-dim); cursor: default; }
.input-footer {
  text-align: center; margin-top: 8px; font-size: 10px; color: #ffffff12;
  font-family: var(--sans); letter-spacing: 2px; text-transform: uppercase;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

@media (max-width: 640px) {
  .header { padding: 14px 16px; }
  .header-title { font-size: 22px; }
  .header-meta { display: none; }
  .welcome-headline { font-size: 28px; }
  .welcome { padding: 45px 16px 30px; }
  .chat-area { padding: 18px 12px 12px; }
  .input-area { padding: 12px 12px 14px; }
  .bubble-user { max-width: 88%; font-size: 16px; }
  .bubble-short { font-size: 16px; }
  .bubble-long { padding: 20px 18px; font-size: 14.5px; }
  .new-chat-btn { right: 16px; }
  .input-field { font-size: 16px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-brand">
      <div class="header-name">VARA5</div>
      <div class="header-title">LuxeVoyage</div>
    </div>
    <div class="header-meta">
      <div class="header-meta-line"><span class="header-dot"></span>Concierge Active</div>
      <div class="header-meta-line header-meta-accent">Private Travel Architecture</div>
    </div>
    <button class="new-chat-btn" onclick="startNewChat()">NEW JOURNEY</button>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner"></div>
  </div>
  <div class="input-area">
    <div class="input-inner">
      <textarea class="input-field" id="inputField" placeholder="Describe your dream journey..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>SEND</button>
    </div>
    <div class="input-footer">VARA5 LuxeVoyage AI Concierge</div>
  </div>
</div>

<script>
const CONFIG = {
  WEBHOOK_URL: 'https://n8n-evo-n8n.aymxwq.easypanel.host/webhook/vara5-web-chat',
  USE_TEST_WEBHOOK: false,
};

function getWebhookUrl() {
  return CONFIG.USE_TEST_WEBHOOK
    ? CONFIG.WEBHOOK_URL.replace('/webhook/', '/webhook-test/')
    : CONFIG.WEBHOOK_URL;
}

let messages = [];
let isLoading = false;
let sessionId = 'web-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);
let loadingInterval = null;

const LOADING_MESSAGES = [
  'Consulting our destination intelligence...',
  'Selecting the finest properties...',
  'Architecting your journey...',
  'Curating experiences and dining...',
  'Refining every detail...',
  'Composing your bespoke itinerary...',
  'Reviewing seasonal conditions...',
  'Confirming availability with partners...',
];

function renderMarkdown(text) {
  let lines = text.split('\n');
  let html = '';
  let inList = false;
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i]
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    if (/^---+$/.test(line.trim())) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<hr>'; continue;
    }
    if (/^#### (.+)$/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h4>' + fmt(line.replace(/^#### /, '')) + '</h4>'; continue;
    }
    if (/^### (.+)$/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h3>' + fmt(line.replace(/^### /, '')) + '</h3>'; continue;
    }
    if (/^## (.+)$/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h2>' + fmt(line.replace(/^## /, '')) + '</h2>'; continue;
    }
    if (/^# (.+)$/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h1>' + fmt(line.replace(/^# /, '')) + '</h1>'; continue;
    }
    if (/^[-•] (.+)$/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + fmt(line.replace(/^[-•] /, '')) + '</li>'; continue;
    }
    if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      continue;
    }
    if (inList) { html += '</ul>'; inList = false; }
    html += '<p>' + fmt(line) + '</p>';
  }
  if (inList) html += '</ul>';
  return html;
}

function fmt(t) {
  return t
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function render() {
  const inner = document.getElementById('chatInner');
  document.getElementById('app').classList.toggle('has-messages', messages.length > 0);
  let html = '';
  if (messages.length === 0 && !isLoading) {
    html += `<div class="welcome">
      <div class="welcome-label">Welcome</div>
      <div class="welcome-headline">How may we shape your next journey?</div>
      <div class="welcome-sub">Share your destination, dates, and preferences. We will architect a bespoke itinerary crafted to the highest standard.</div>
      <div class="welcome-suggestions">
        <button class="suggestion-btn" onclick="useSuggestion('We are a couple planning 7 days in Japan for mid-April. Cherry blossom season, mix of culture and fine dining.')"><span class="suggestion-icon">&#9711;</span>7 days in Japan, mid-April, couple</button>
        <button class="suggestion-btn" onclick="useSuggestion('Solo trip, 5 days split between Barcelona and Paris. Art, architecture, and Michelin dining.')"><span class="suggestion-icon">&#9711;</span>5 days Barcelona and Paris, solo traveler</button>
        <button class="suggestion-btn" onclick="useSuggestion('Family holiday with two children (ages 8 and 12), 10 days across Italy. Rome, Amalfi, Florence.')"><span class="suggestion-icon">&#9711;</span>10 days Italy, family with kids</button>
      </div></div>`;
  }
  messages.forEach((msg, i) => {
    if (msg.role === 'user') {
      html += `<div class="message message-user"><div class="bubble-user">${esc(msg.content)}</div></div>`;
    } else {
      const long = msg.content.length > 600;
      html += `<div class="message message-assistant"><div style="width:100%">
        <div class="message-label">Clyde</div>
        <div class="bubble-assistant ${long ? 'bubble-long' : 'bubble-short'}">${renderMarkdown(msg.content)}</div>
        ${long ? `<div class="message-actions">
          <button class="action-btn" id="copy-${i}" onclick="copyText(${i})">Copy</button>
          <button class="action-btn" onclick="downloadText(${i})">Download</button>
        </div>` : ''}
      </div></div>`;
    }
  });
  if (isLoading) {
    html += `<div class="loading-wrapper"><div class="message-label">Clyde</div>
      <div class="loading-bubble">
        <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        <div class="loading-text" id="loadingText">${LOADING_MESSAGES[0]}</div>
      </div></div>`;
  }
  inner.innerHTML = html;
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function useSuggestion(t) {
  document.getElementById('inputField').value = t;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inputField').focus();
}

async function sendMessage() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text || isLoading) return;
  messages.push({ role: 'user', content: text });
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isLoading = true; render();
  let idx = 0;
  loadingInterval = setInterval(() => {
    idx = (idx + 1) % LOADING_MESSAGES.length;
    const el = document.getElementById('loadingText');
    if (el) { el.style.opacity = '0'; setTimeout(() => { if(el){el.textContent=LOADING_MESSAGES[idx];el.style.opacity='1';} }, 300); }
  }, 3500);
  try {
    const r = await fetch(getWebhookUrl(), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    messages.push({ role: 'assistant', content: d.response || d.output || 'We apologize, something went awry. Please try again.' });
  } catch (e) {
    console.error('VARA5 Error:', e);
    messages.push({ role: 'assistant', content: 'We apologize for the interruption. Our concierge service is momentarily unavailable. Please try again.' });
  } finally {
    isLoading = false; clearInterval(loadingInterval); loadingInterval = null; render();
  }
}

function copyText(i) {
  navigator.clipboard.writeText(messages[i].content).then(() => {
    const b = document.getElementById('copy-' + i);
    if (b) { b.textContent='Copied'; b.classList.add('copied'); setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000); }
  });
}

function downloadText(i) {
  const b = new Blob([messages[i].content], { type: 'text/plain;charset=utf-8' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u; a.download = 'VARA5-Itinerary-' + new Date().toISOString().slice(0,10) + '.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
}

function startNewChat() {
  messages = []; sessionId = 'web-' + Date.now() + '-' + Math.random().toString(36).substring(2,8);
  isLoading = false; clearInterval(loadingInterval); render();
  document.getElementById('inputField').focus();
}

const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
inputField.addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  sendBtn.disabled = !this.value.trim() || isLoading;
});
inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

render(); inputField.focus();
</script>
</body>
</html>
